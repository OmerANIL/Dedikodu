cat << 'EOF' > .github/workflows/build.yml
name: Otomatik APK Olusturucu

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodlari Klonla
      uses: actions/checkout@v3

    - name: Java Kurulumu
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Calistirma Izni Ver
      run: chmod +x ./gradlew

    - name: APK Derle
      run: ./gradlew assembleDebug

    - name: Sisteme Yukle
      uses: actions/upload-artifact@v3
      with:
        name: Benim-Uygulamam-APK
        path: app/build/outputs/apk/debug/app-debug.apk
EOF
